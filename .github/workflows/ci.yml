name: Tests JUnit CI

on:
    push:
        branches: [ main ]
    pull_request:
        branches: [ main ]
    workflow_dispatch:
jobs:
    tests:
        runs-on: ubuntu-latest
        steps:
            # 1. Récupérer le code
            - uses: actions/checkout@v4
            # 2. Installer Java 21
            - uses: actions/setup-java@v4
              with:
                distribution: 'temurin'
                java-version: '21'
            # 3. Lancer les tests
            - name: Exécuter les tests JUnit
              run: mvn --batch-mode test